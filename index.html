<!DOCTYPE html>
<html lang="de-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lehrlings-Budget Schweiz</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js for beautiful charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0B0E14',
                            card: '#151A23',
                            accent: '#6366F1', // Indigo
                            success: '#10B981', // Emerald
                            danger: '#F43F5E', // Rose
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0B0E14;
            color: #F8FAFC;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%);
            background-attachment: fixed;
        }

        /* Glassmorphism utility */
        .glass-card {
            background: rgba(21, 26, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .gradient-text {
            background: linear-gradient(to right, #818CF8, #C084FC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-gradient {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-in-right { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="antialiased min-h-screen pb-20">

    <div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 fade-in">
            <div>
                <h1 class="text-2xl font-bold tracking-tight flex items-center gap-2">
                    Hallo, <span class="gradient-text" id="user-greeting">Lehrling</span>
                    <button id="edit-name-btn" class="text-slate-500 hover:text-brand-accent transition-colors p-1 rounded-md hover:bg-slate-800/50" title="Name ändern">
                        <i data-lucide="pencil" class="w-4 h-4"></i>
                    </button>
                </h1>
                <p class="text-sm text-slate-400 mt-1">Behalte dein Budget im Griff.</p>
            </div>
            <div class="h-10 w-10 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">
                <i data-lucide="wallet" class="text-brand-accent h-5 w-5"></i>
            </div>
        </header>

        <!-- Main Dashboard Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 fade-in" style="animation-delay: 0.1s;">
            
            <!-- Total Balance Card -->
            <div class="md:col-span-3 balance-gradient rounded-3xl p-6 relative overflow-hidden group">
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-10 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-700"></div>
                <p class="text-indigo-100 text-sm font-medium mb-1 opacity-90">Aktueller Kontostand</p>
                <h2 class="text-4xl sm:text-5xl font-bold text-white tracking-tight mb-4" id="total-balance">CHF 0.00</h2>
                
                <div class="flex gap-4 sm:gap-8 mt-6 pt-4 border-t border-indigo-400/30">
                    <div>
                        <div class="flex items-center gap-1.5 text-indigo-100 text-xs sm:text-sm mb-1">
                            <i data-lucide="arrow-down-circle" class="w-4 h-4 text-emerald-300"></i> Einnahmen
                        </div>
                        <p class="text-lg sm:text-xl font-semibold text-white" id="total-income">CHF 0.00</p>
                    </div>
                    <div>
                        <div class="flex items-center gap-1.5 text-indigo-100 text-xs sm:text-sm mb-1">
                            <i data-lucide="arrow-up-circle" class="w-4 h-4 text-rose-300"></i> Ausgaben
                        </div>
                        <p class="text-lg sm:text-xl font-semibold text-white" id="total-expense">CHF 0.00</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Obere Reihe: Eingabe & Verlauf -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            
            <!-- Add Transaction Section -->
            <div class="fade-in" style="animation-delay: 0.2s;">
                <div class="glass-card rounded-3xl p-6 h-full">
                    <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-5 h-5 text-brand-accent"></i> 
                        Neuer Eintrag
                    </h3>
                    
                    <form id="transaction-form" class="space-y-4">
                        <!-- Type Switcher -->
                        <div class="flex p-1 bg-slate-900/50 rounded-xl mb-4 border border-slate-700/50">
                            <button type="button" id="btn-expense" class="flex-1 py-2 text-sm font-medium rounded-lg bg-rose-500/20 text-rose-400 border border-rose-500/30 transition-all">Ausgabe</button>
                            <button type="button" id="btn-income" class="flex-1 py-2 text-sm font-medium rounded-lg text-slate-400 hover:text-slate-200 transition-all">Einnahme</button>
                        </div>
                        <input type="hidden" id="trans-type" value="expense">

                        <!-- Amount -->
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">Betrag (CHF)</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <span class="text-slate-500">CHF</span>
                                </div>
                                <input type="number" id="trans-amount" step="0.05" required placeholder="0.00" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all">
                            </div>
                        </div>

                        <!-- Description -->
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">Beschreibung</label>
                            <input type="text" id="trans-desc" required placeholder="z.B. Mittagessen, Handyabo..." class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 px-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all">
                        </div>

                        <!-- Category -->
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">Kategorie</label>
                            <div class="relative">
                                <select id="trans-category" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 pl-4 pr-10 text-white appearance-none focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all">
                                    <!-- Options populated by JS -->
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-slate-400">
                                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="w-full mt-2 bg-brand-accent hover:bg-indigo-600 text-white font-medium py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-brand-accent/20">
                            Hinzufügen
                        </button>
                    </form>
                </div>
            </div>

            <!-- Transactions List -->
            <div class="fade-in" style="animation-delay: 0.3s;">
                <div class="glass-card rounded-3xl p-6 flex flex-col h-[480px]">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-semibold flex items-center gap-2">
                            <i data-lucide="list" class="w-5 h-5 text-brand-accent"></i> 
                            Verlauf
                        </h3>
                        <span class="text-xs bg-slate-800 text-slate-300 py-1 px-2.5 rounded-full border border-slate-700" id="trans-count">0 Einträge</span>
                    </div>

                    <div class="flex-1 overflow-y-auto pr-2 space-y-3" id="transaction-list">
                        <!-- Transactions will be injected here -->
                    </div>
                </div>
            </div>

        </div>

        <!-- Heatmap (Aktivität) -->
        <div class="mb-6 fade-in" style="animation-delay: 0.35s;">
            <div class="glass-card rounded-3xl p-6">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="calendar-days" class="w-5 h-5 text-brand-accent"></i> 
                    Aktivität (letzte 6 Monate)
                </h3>
                
                <!-- Horizontal scrollbarer Container für das Diagramm -->
                <div class="w-full overflow-x-auto pb-2">
                    <div id="heatmap-grid" style="display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column; gap: 4px; min-width: max-content;">
                        <!-- Die Quadrate werden via JS injiziert -->
                    </div>
                </div>
                
                <!-- Legende -->
                <div class="flex items-center justify-end gap-2 mt-4 text-xs text-slate-400">
                    <span>Ausgaben</span>
                    <div class="flex gap-1">
                        <div class="w-3 h-3 rounded-[3px] bg-[#F43F5E] opacity-20"></div>
                        <div class="w-3 h-3 rounded-[3px] bg-[#F43F5E] opacity-60"></div>
                        <div class="w-3 h-3 rounded-[3px] bg-[#F43F5E]"></div>
                    </div>
                    <span class="ml-4">Einnahmen</span>
                    <div class="flex gap-1">
                        <div class="w-3 h-3 rounded-[3px] bg-[#10B981] opacity-20"></div>
                        <div class="w-3 h-3 rounded-[3px] bg-[#10B981] opacity-60"></div>
                        <div class="w-3 h-3 rounded-[3px] bg-[#10B981]"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Untere Reihe: Diagramme -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 fade-in" style="animation-delay: 0.4s;">
            
            <!-- Chart Card (Ausgaben Analyse) -->
            <div class="glass-card rounded-3xl p-6">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="pie-chart" class="w-5 h-5 text-brand-accent"></i> 
                    Ausgaben-Analyse
                </h3>
                <div class="relative h-48 w-full flex justify-center items-center">
                    <canvas id="expenseChart"></canvas>
                    <!-- Fallback empty state -->
                    <div id="chart-empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 hidden">
                        <i data-lucide="pie-chart" class="w-8 h-8 mb-2 opacity-50"></i>
                        <p class="text-sm">Keine Ausgaben vorhanden</p>
                    </div>
                </div>
            </div>

            <!-- Cashflow Analysis Chart -->
            <div class="glass-card rounded-3xl p-6">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="bar-chart-3" class="w-5 h-5 text-brand-accent"></i> 
                    Cashflow
                </h3>
                <div class="relative h-48 w-full flex justify-center items-center">
                    <canvas id="flowChart"></canvas>
                </div>
            </div>

        </div>
    </div>

    <!-- Welcome Modal -->
    <div id="welcome-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0B0E14]/80 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">
        <div class="glass-card rounded-3xl p-8 max-w-sm w-full mx-4 transform scale-95 transition-all duration-300" id="welcome-modal-content">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-brand-accent/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-brand-accent/30 shadow-[0_0_15px_rgba(99,102,241,0.5)]">
                    <i data-lucide="user" class="w-8 h-8 text-brand-accent"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2">Willkommen!</h2>
                <p class="text-slate-400 text-sm">Wie ist dein Vorname?</p>
            </div>
            <form id="welcome-form" class="space-y-4">
                <div>
                    <input type="text" id="name-input" required placeholder="Dein Vorname" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 px-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all text-center text-lg shadow-inner">
                </div>
                <button type="submit" class="w-full bg-brand-accent hover:bg-indigo-600 text-white font-medium py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-brand-accent/20">
                    Starten
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        // --- State Management ---
        const STORAGE_KEY = 'lehrlings_budget_v1';
        const NAME_STORAGE_KEY = 'lehrlings_name_v1';
        
        let userName = localStorage.getItem(NAME_STORAGE_KEY);
        
        // Helper für dynamische Daten (Tage in der Vergangenheit)
        const daysAgo = (days) => new Date(Date.now() - days * 86400000).toISOString();

        // Default data for demonstration
        const defaultTransactions = [
            { id: 1, text: 'Lehrlingslohn (August)', amount: 850.00, type: 'income', category: 'Lohn', date: daysAgo(2) },
            { id: 2, text: 'SBB GA Abo', amount: 245.00, type: 'expense', category: 'ÖV / Mobilität', date: daysAgo(3) },
            { id: 3, text: 'Mittagessen Bäckerei', amount: 12.50, type: 'expense', category: 'Essen & Trinken', date: daysAgo(5) },
            { id: 4, text: 'Kino & Snacks', amount: 35.00, type: 'expense', category: 'Freizeit & Ausgang', date: daysAgo(8) },
            { id: 5, text: 'Handyabo Swisscom', amount: 39.90, type: 'expense', category: 'Abos & Medien', date: daysAgo(12) },
            { id: 6, text: 'Sparkonto (Fahrprüfung)', amount: 150.00, type: 'expense', category: 'Sparen', date: daysAgo(15) },
            { id: 7, text: 'Kaffee & Gipfeli', amount: 6.50, type: 'expense', category: 'Essen & Trinken', date: daysAgo(1) },
            { id: 8, text: 'Zalando (Neue Schuhe)', amount: 120.00, type: 'expense', category: 'Kleidung', date: daysAgo(18) },
            { id: 9, text: 'Spotify Premium', amount: 13.95, type: 'expense', category: 'Abos & Medien', date: daysAgo(20) },
            { id: 10, text: 'Ausgang (Club)', amount: 65.00, type: 'expense', category: 'Freizeit & Ausgang', date: daysAgo(22) },
            { id: 11, text: 'Geburtstagsgeld Oma', amount: 100.00, type: 'income', category: 'Geschenke', date: daysAgo(25) },
            { id: 12, text: 'Döner am Bahnhof', amount: 11.00, type: 'expense', category: 'Essen & Trinken', date: daysAgo(28) },
            { id: 13, text: 'Lehrlingslohn (Juli)', amount: 850.00, type: 'income', category: 'Lohn', date: daysAgo(32) },
            { id: 14, text: 'Coiffeur', amount: 45.00, type: 'expense', category: 'Sonstiges', date: daysAgo(35) },
            { id: 15, text: 'Mittagessen Mensa', amount: 14.50, type: 'expense', category: 'Essen & Trinken', date: daysAgo(38) },
            { id: 16, text: 'Konzert-Ticket', amount: 85.00, type: 'expense', category: 'Freizeit & Ausgang', date: daysAgo(45) },
            { id: 17, text: 'Netflix (Anteil)', amount: 9.00, type: 'expense', category: 'Abos & Medien', date: daysAgo(50) },
            { id: 18, text: 'Lehrlingslohn (Juni)', amount: 850.00, type: 'income', category: 'Lohn', date: daysAgo(62) },
            { id: 19, text: 'Altes iPhone verkauft', amount: 250.00, type: 'income', category: 'Verkauf/Ricardo', date: daysAgo(70) },
            { id: 20, text: 'H&M T-Shirts', amount: 49.90, type: 'expense', category: 'Kleidung', date: daysAgo(75) },
            { id: 21, text: 'Europa-Park Ausflug', amount: 110.00, type: 'expense', category: 'Freizeit & Ausgang', date: daysAgo(82) },
            { id: 22, text: 'Lehrlingslohn (Mai)', amount: 850.00, type: 'income', category: 'Lohn', date: daysAgo(93) },
            { id: 23, text: 'Red Bull Palette', amount: 28.00, type: 'expense', category: 'Essen & Trinken', date: daysAgo(105) },
            { id: 24, text: 'Fitness Abo', amount: 59.00, type: 'expense', category: 'Abos & Medien', date: daysAgo(115) },
            { id: 25, text: 'Lehrlingslohn (April)', amount: 850.00, type: 'income', category: 'Lohn', date: daysAgo(123) },
            { id: 26, text: 'Kino (Popcorn & Cola)', amount: 25.00, type: 'expense', category: 'Freizeit & Ausgang', date: daysAgo(140) },
            { id: 27, text: 'Sackgeld Eltern', amount: 50.00, type: 'income', category: 'Sackgeld', date: daysAgo(150) },
            { id: 28, text: 'Lehrlingslohn (März)', amount: 850.00, type: 'income', category: 'Lohn', date: daysAgo(153) },
            { id: 29, text: 'Neues Ladekabel', amount: 29.90, type: 'expense', category: 'Sonstiges', date: daysAgo(165) }
        ];

        // Load from LocalStorage OR use default data
        let transactions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultTransactions;

        function saveTransactions() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
        }

        const expenseCategories = ['Essen & Trinken', 'Freizeit & Ausgang', 'ÖV / Mobilität', 'Abos & Medien', 'Kleidung', 'Sparen', 'Sonstiges'];
        const incomeCategories = ['Lohn', 'Sackgeld', 'Geschenke', 'Verkauf/Ricardo', 'Sonstiges'];

        // --- DOM Elements ---
        const balanceEl = document.getElementById('total-balance');
        const incomeEl = document.getElementById('total-income');
        const expenseEl = document.getElementById('total-expense');
        const listEl = document.getElementById('transaction-list');
        const formEl = document.getElementById('transaction-form');
        const countEl = document.getElementById('trans-count');
        const categorySelect = document.getElementById('trans-category');
        
        // Type Switcher Elements
        const btnExpense = document.getElementById('btn-expense');
        const btnIncome = document.getElementById('btn-income');
        const typeInput = document.getElementById('trans-type');

        // Welcome Modal Elements
        const greetingEl = document.getElementById('user-greeting');
        const welcomeModal = document.getElementById('welcome-modal');
        const welcomeModalContent = document.getElementById('welcome-modal-content');
        const welcomeForm = document.getElementById('welcome-form');
        const nameInput = document.getElementById('name-input');
        const editNameBtn = document.getElementById('edit-name-btn'); // Neuer Button

        let myChart = null; // Hold pie chart instance
        let flowChartInstance = null; // Hold bar chart instance

        // --- Init App ---
        function init() {
            lucide.createIcons();
            setupEventListeners();
            updateCategoryOptions();
            checkUser();
            updateDOM();
        }

        // --- Event Listeners ---
        function setupEventListeners() {
            formEl.addEventListener('submit', addTransaction);
            
            btnExpense.addEventListener('click', () => setTransactionType('expense'));
            btnIncome.addEventListener('click', () => setTransactionType('income'));

            welcomeForm.addEventListener('submit', handleWelcomeSubmit);
            
            // Name bearbeiten
            editNameBtn.addEventListener('click', () => {
                nameInput.value = userName || '';
                showWelcomeModal();
            });
        }

        // --- User Logic ---
        function checkUser() {
            if (userName) {
                greetingEl.innerText = userName;
            } else {
                showWelcomeModal();
            }
        }

        function showWelcomeModal() {
            welcomeModal.classList.remove('hidden');
            // Small delay for CSS transition to trigger
            setTimeout(() => {
                welcomeModal.classList.remove('opacity-0');
                welcomeModalContent.classList.remove('scale-95');
                welcomeModalContent.classList.add('scale-100');
                nameInput.focus();
            }, 10);
        }

        function hideWelcomeModal() {
            welcomeModal.classList.add('opacity-0');
            welcomeModalContent.classList.remove('scale-100');
            welcomeModalContent.classList.add('scale-95');
            setTimeout(() => {
                welcomeModal.classList.add('hidden');
            }, 300);
        }

        function handleWelcomeSubmit(e) {
            e.preventDefault();
            const name = nameInput.value.trim();
            if (name) {
                userName = name;
                localStorage.setItem(NAME_STORAGE_KEY, userName);
                greetingEl.innerText = userName;
                hideWelcomeModal();
            }
        }

        // --- UI Logic ---
        function setTransactionType(type) {
            typeInput.value = type;
            if (type === 'expense') {
                btnExpense.className = "flex-1 py-2 text-sm font-medium rounded-lg bg-rose-500/20 text-rose-400 border border-rose-500/30 transition-all";
                btnIncome.className = "flex-1 py-2 text-sm font-medium rounded-lg text-slate-400 hover:text-slate-200 transition-all";
            } else {
                btnIncome.className = "flex-1 py-2 text-sm font-medium rounded-lg bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 transition-all";
                btnExpense.className = "flex-1 py-2 text-sm font-medium rounded-lg text-slate-400 hover:text-slate-200 transition-all";
            }
            updateCategoryOptions();
        }

        function updateCategoryOptions() {
            const isExpense = typeInput.value === 'expense';
            const categories = isExpense ? expenseCategories : incomeCategories;
            
            categorySelect.innerHTML = categories.map(cat => 
                `<option value="${cat}" class="bg-brand-card">${cat}</option>`
            ).join('');
        }

        function formatMoney(amount) {
            // Swiss formatting: CHF 1'234.50
            return new Intl.NumberFormat('de-CH', { 
                style: 'currency', 
                currency: 'CHF' 
            }).format(amount);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) return 'Heute';
            if (date.toDateString() === yesterday.toDateString()) return 'Gestern';
            
            return date.toLocaleDateString('de-CH', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function getCategoryIcon(category) {
            const iconMap = {
                'Essen & Trinken': 'coffee',
                'Freizeit & Ausgang': 'party-popper',
                'ÖV / Mobilität': 'train-front',
                'Abos & Medien': 'smartphone',
                'Kleidung': 'shirt',
                'Sparen': 'piggy-bank',
                'Lohn': 'coins',
                'Sackgeld': 'wallet',
                'Geschenke': 'gift',
                'Verkauf/Ricardo': 'shopping-bag',
                'Sonstiges': 'layout-grid'
            };
            return iconMap[category] || 'circle-dollar-sign';
        }

        // --- Core Functions ---
        function updateDOM() {
            // Clear list
            listEl.innerHTML = '';

            // Sort transactions by date (newest first)
            const sortedTransactions = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));

            if (sortedTransactions.length === 0) {
                listEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-10 text-slate-500 text-center h-full">
                        <i data-lucide="receipt" class="w-12 h-12 mb-3 opacity-20"></i>
                        <p>Noch keine Einträge vorhanden.<br>Füge deine erste Buchung hinzu!</p>
                    </div>
                `;
            } else {
                sortedTransactions.forEach(addTransactionToDOM);
            }

            updateValues();
            updateChart();
            updateHeatmap();
            lucide.createIcons(); // Re-init icons for new DOM elements
            countEl.innerText = `${transactions.length} ${transactions.length === 1 ? 'Eintrag' : 'Einträge'}`;
        }

        function addTransactionToDOM(transaction) {
            const isIncome = transaction.type === 'income';
            const sign = isIncome ? '+' : '-';
            const amountColor = isIncome ? 'text-emerald-400' : 'text-slate-100';
            const iconBg = isIncome ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-slate-300';
            
            const item = document.createElement('div');
            item.className = 'group flex items-center justify-between p-3.5 bg-slate-900/40 border border-slate-800/50 rounded-2xl hover:bg-slate-800/60 transition-colors slide-in-right';
            
            item.innerHTML = `
                <div class="flex items-center gap-3.5 overflow-hidden">
                    <div class="w-10 h-10 rounded-full ${iconBg} flex items-center justify-center flex-shrink-0">
                        <i data-lucide="${getCategoryIcon(transaction.category)}" class="w-5 h-5"></i>
                    </div>
                    <div class="min-w-0">
                        <p class="font-medium text-slate-200 truncate pr-2 text-sm sm:text-base">${transaction.text}</p>
                        <div class="flex items-center gap-2 text-xs text-slate-400">
                            <span class="truncate max-w-[100px] sm:max-w-[150px]">${transaction.category}</span>
                            <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                            <span>${formatDate(transaction.date)}</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-3 flex-shrink-0">
                    <span class="font-semibold ${amountColor} tracking-tight">${sign} ${formatMoney(Math.abs(transaction.amount))}</span>
                    <button onclick="removeTransaction(${transaction.id})" class="opacity-0 group-hover:opacity-100 p-2 text-slate-500 hover:text-rose-400 hover:bg-rose-500/10 rounded-lg transition-all focus:opacity-100">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `;
            listEl.appendChild(item);
        }

        function updateValues() {
            const amounts = transactions.map(transaction => 
                transaction.type === 'income' ? transaction.amount : -transaction.amount
            );

            const total = amounts.reduce((acc, item) => (acc += item), 0);
            
            const income = transactions
                .filter(item => item.type === 'income')
                .reduce((acc, item) => (acc += item.amount), 0);

            const expense = transactions
                .filter(item => item.type === 'expense')
                .reduce((acc, item) => (acc += item.amount), 0);

            // Animate number changes (simple version)
            balanceEl.innerText = formatMoney(total);
            incomeEl.innerText = formatMoney(income);
            expenseEl.innerText = formatMoney(expense);
        }

        function addTransaction(e) {
            e.preventDefault();

            const textInput = document.getElementById('trans-desc');
            const amountInput = document.getElementById('trans-amount');
            
            if (textInput.value.trim() === '' || amountInput.value.trim() === '') {
                return; // Basic validation
            }

            const transaction = {
                id: Math.floor(Math.random() * 100000000),
                text: textInput.value,
                amount: +amountInput.value,
                type: typeInput.value,
                category: categorySelect.value,
                date: new Date().toISOString()
            };

            transactions.unshift(transaction); // Add to beginning

            saveTransactions(); // Save to LocalStorage
            updateDOM();

            // Reset form
            textInput.value = '';
            amountInput.value = '';
            textInput.focus();
        }

        function removeTransaction(id) {
            transactions = transactions.filter(transaction => transaction.id !== id);
            saveTransactions(); // Save to LocalStorage
            updateDOM();
        }

        // --- Chart Logic ---
        function updateChart() {
            // 1. Prepare Data for Pie Chart (Expenses)
            const expensesByCategory = {};
            let hasExpenses = false;
            let totalIncome = 0;
            let totalExpense = 0;

            transactions.forEach(t => {
                if (t.type === 'expense') {
                    hasExpenses = true;
                    totalExpense += t.amount;
                    if (expensesByCategory[t.category]) {
                        expensesByCategory[t.category] += t.amount;
                    } else {
                        expensesByCategory[t.category] = t.amount;
                    }
                } else {
                    totalIncome += t.amount;
                }
            });

            // --- Expense Doughnut Chart ---
            const emptyState = document.getElementById('chart-empty-state');
            const canvasEl = document.getElementById('expenseChart');

            if (!hasExpenses) {
                canvasEl.style.display = 'none';
                emptyState.classList.remove('hidden');
            } else {
                canvasEl.style.display = 'block';
                emptyState.classList.add('hidden');

                const labels = Object.keys(expensesByCategory);
                const data = Object.values(expensesByCategory);

                const backgroundColors = [
                    '#3B82F6', '#8B5CF6', '#EC4899', '#F43F5E', '#F59E0B', '#10B981', '#64748B'
                ];

                if (myChart) myChart.destroy();

                const ctx = canvasEl.getContext('2d');
                Chart.defaults.color = '#94A3B8';
                Chart.defaults.font.family = "'Outfit', sans-serif";

                myChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: backgroundColors,
                            borderWidth: 0,
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '75%',
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { padding: 15, usePointStyle: true, pointStyle: 'circle', font: { size: 11 } }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(15, 23, 42, 0.9)',
                                titleColor: '#fff',
                                bodyColor: '#cbd5e1',
                                borderColor: 'rgba(255,255,255,0.1)',
                                borderWidth: 1,
                                padding: 10,
                                callbacks: {
                                    label: function(context) {
                                        return (context.label ? context.label + ': ' : '') + formatMoney(context.parsed);
                                    }
                                }
                            }
                        }
                    }
                });
            }

            // --- Cashflow Bar Chart ---
            const flowCanvasEl = document.getElementById('flowChart');
            const flowCtx = flowCanvasEl.getContext('2d');

            if (flowChartInstance) flowChartInstance.destroy();

            // Create gradients for premium look
            const incomeGradient = flowCtx.createLinearGradient(0, 0, 0, 400);
            incomeGradient.addColorStop(0, 'rgba(16, 185, 129, 0.8)'); // Emerald top
            incomeGradient.addColorStop(1, 'rgba(16, 185, 129, 0.2)'); // Emerald bottom

            const expenseGradient = flowCtx.createLinearGradient(0, 0, 0, 400);
            expenseGradient.addColorStop(0, 'rgba(244, 63, 94, 0.8)'); // Rose top
            expenseGradient.addColorStop(1, 'rgba(244, 63, 94, 0.2)'); // Rose bottom

            flowChartInstance = new Chart(flowCtx, {
                type: 'bar',
                data: {
                    labels: ['Einnahmen', 'Ausgaben'],
                    datasets: [{
                        data: [totalIncome, totalExpense],
                        backgroundColor: [incomeGradient, expenseGradient],
                        borderRadius: 8,
                        borderSkipped: false,
                        barThickness: 40
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#fff',
                            bodyColor: '#cbd5e1',
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1,
                            padding: 10,
                            callbacks: {
                                label: function(context) { return formatMoney(context.parsed.y); }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)', drawBorder: false },
                            ticks: { display: false } // Hide y-axis numbers for cleaner look
                        },
                        x: {
                            grid: { display: false, drawBorder: false },
                            ticks: { color: '#94A3B8', font: { size: 12, weight: '500' } }
                        }
                    }
                }
            });
        }

        function updateHeatmap() {
            const heatmapEl = document.getElementById('heatmap-grid');
            if (!heatmapEl) return;
            
            heatmapEl.innerHTML = '';

            const dailyNet = {};
            let maxIncome = 0;
            let maxExpense = 0;

            // 1. Berechne den "Netto-Tageswert" (Einnahmen - Ausgaben)
            transactions.forEach(t => {
                const d = new Date(t.date);
                const dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                
                if (!dailyNet[dateStr]) dailyNet[dateStr] = 0;
                
                if (t.type === 'income') dailyNet[dateStr] += t.amount;
                else dailyNet[dateStr] -= t.amount;
            });

            // Finde die Maximalwerte, um die Intensität der Farben dynamisch zu skalieren
            for (const val of Object.values(dailyNet)) {
                if (val > 0 && val > maxIncome) maxIncome = val;
                if (val < 0 && Math.abs(val) > maxExpense) maxExpense = Math.abs(val);
            }

            const daysToShow = 182; // Anzeige der letzten ~6 Monate
            const today = new Date();
            today.setHours(0,0,0,0);

            const startDate = new Date(today);
            startDate.setDate(today.getDate() - daysToShow + 1);

            const startDayOfWeek = startDate.getDay(); // 0 ist Sonntag
            const paddingDays = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;

            // Füge unsichtbare Blöcke am Anfang hinzu, damit Montag immer in der 1. Zeile startet (Wie bei GitHub)
            for(let i = 0; i < paddingDays; i++) {
                const cell = document.createElement('div');
                cell.className = "w-3 h-3 sm:w-4 sm:h-4 rounded-[3px] opacity-0";
                heatmapEl.appendChild(cell);
            }

            for (let i = daysToShow - 1; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                const dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                
                const net = dailyNet[dateStr] || 0;
                const cell = document.createElement('div');
                
                let bgColor = '#1E293B'; // Schwarz / Dunkelgrau für Tage ohne Transaktionen
                
                if (net > 0) {
                    // Grün für Einnahmen (mit Quadratwurzel-Kurve, damit auch kleine Beträge sichtbar sind)
                    let intensity = maxIncome ? 0.2 + (0.8 * Math.pow(net / maxIncome, 0.5)) : 0.2;
                    bgColor = `rgba(16, 185, 129, ${intensity})`;
                } else if (net < 0) {
                    // Rot für Ausgaben
                    let intensity = maxExpense ? 0.2 + (0.8 * Math.pow(Math.abs(net) / maxExpense, 0.5)) : 0.2;
                    bgColor = `rgba(244, 63, 94, ${intensity})`;
                }

                // CSS Klassen für Form, Hover-Vergrösserung und Tooltip
                cell.className = "w-3 h-3 sm:w-4 sm:h-4 rounded-[3px] transition-all hover:scale-125 hover:z-10 cursor-pointer border border-white/5";
                cell.style.backgroundColor = bgColor;
                
                const niceDate = d.toLocaleDateString('de-CH');
                const sign = net > 0 ? '+' : '';
                cell.title = `${niceDate}: ${net === 0 ? 'Keine Buchungen' : sign + formatMoney(net)}`;
                
                heatmapEl.appendChild(cell);
            }
        }

        // Start App
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
